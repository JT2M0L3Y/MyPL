name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3-pip libgtest-dev cppcheck clang-tidy
          cd /usr/src/gtest && sudo cmake . && sudo make
          sudo cp lib/*.a /usr/lib
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DENABLE_CLANG_TIDY=OFF
      - name: Build
        run: cmake --build build --config Debug
      - name: Run unit tests
        run: cmake --build build --config Debug --target extension_tests && ctest --test-dir build --output-on-failure
      - name: Run cppcheck (optional)
        if: always()
        run: cmake --build build --target cppcheck
